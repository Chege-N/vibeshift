
services:
  # ─── PostgreSQL Database ───────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: repurposeai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-repurposeai}
      POSTGRES_USER: ${POSTGRES_USER:-repurposeai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-RevolutionNow369!*}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-repurposeai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - repurposeai_net

  # ─── Redis (Cache + Queue) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: repurposeai_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - repurposeai_net

  # ─── FastAPI Backend ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: repurposeai_backend
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - repurposeai_net
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # ─── Celery Worker (Async AI Jobs) ────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: repurposeai_celery
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    depends_on:
      - backend
      - redis
      - postgres
    networks:
      - repurposeai_net
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4 -Q celery,repurpose,transcription,email

  # ─── Celery Beat (Scheduled Tasks) ────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: repurposeai_celery_beat
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    volumes:
      - ./backend:/app
    depends_on:
      - celery_worker
    networks:
      - repurposeai_net
    command: celery -A app.core.celery_app beat --loglevel=info

  # ─── Flower (Celery Monitor) ───────────────────────────────
  #flower:
    
    #build:
     # context: ./backend
      #dockerfile: Dockerfile
    #container_name: repurposeai_flower
    #restart: unless-stopped
    #env_file: .env
    #ports:
     # - "5555:5555"
    #depends_on:
     # - celery_worker
    #networks:
     # - repurposeai_net
    #command: celery -A app.core.celery_app flower --port=5555

  # ─── React Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
        - VITE_APP_NAME=${VITE_APP_NAME:-RepurposeAI}
    container_name: repurposeai_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - repurposeai_net

  # ─── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: repurposeai_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - repurposeai_net

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  repurposeai_net:
    driver: bridge
